<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>
            Zac's Checklist Progress Component
        </mat-card-title>
    </mat-card-header>
    <mat-card-content>

    @for (task of pizzaTasks(); track task.id) {
        <mat-checkbox
            [checked]="task.completed"
            (change)="toggleTask(task.id)"
         >{{task.id}}: {{task.name}}
        </mat-checkbox>
        <br>
    }

        <h3>Pizza Percentage Complete: {{total()}}%</h3>
    </mat-card-content>
</mat-card>
